[build]
  command = "npm run build"
  publish = "apps/web/dist"

[functions]
  directory = "netlify/functions"
  node_bundler = "esbuild"

[[redirects]]
  from = "/api/*"
  to = "/.netlify/functions/:splat"
  status = 200

[[redirects]]
  from = "/portal"
  to = "/index.html"
  status = 200

[[redirects]]
  from = "/portal/*"
  to = "/index.html"
  status = 200
